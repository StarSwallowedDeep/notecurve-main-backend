name: Backend Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v3

      # 2. 자바 실행 환경 설치 (테스트를 돌리기 위해 필수)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21' 
          distribution: 'temurin'

      # 3. 테스트 실행 (실패하면 여기서 배포 중단)
      - name: Run Tests
        run: chmod +x gradlew && ./gradlew test

      # 4. Docker Hub 로그인
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 5. Docker 이미지 빌드 & Push
      - name: Build & Push Backend Image
        run: |
          docker build -t test-backend:${{ github.sha }} .
          docker tag test-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ github.sha }}

      # 6. EC2로 docker-compose.yml 파일 전송
      # - name: Copy docker-compose.yml to EC2
      #   uses: appleboy/scp-action@master
      #   with:
      #     host: ${{ secrets.EC2_HOST }}
      #     username: ${{ secrets.EC2_USERNAME }}
      #     key: ${{ secrets.EC2_SSH_KEY }}
      #     source: "docker-compose.yml"
      #     target: "~/"

      # 7. EC2 SSH 접속 → Pull & 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # env를 통해 Compose 파일에 값을 넘겨줌
          envs: GITHUB_SHA, DOCKER_USERNAME
          script: |
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            sudo -E docker-compose pull
            sudo -E docker-compose up -d
            sudo docker image prune -f

          #  sudo docker pull ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ github.sha }}
          #  sudo docker stop backend || true
          #  sudo docker rm backend || true
          #  sudo docker run -d --name backend -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ github.sha }}
          #  sudo docker image prune -f
